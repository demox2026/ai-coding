<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>美食发现 · 发现身边的美味</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="header">
        <div class="header-content">
          <div class="logo">
            <i class="fas fa-utensils"></i>
            <span>美食发现</span>
          </div>
          <button class="profile-btn">
            <i class="fas fa-user-circle"></i>
          </button>
        </div>
      </header>

      <!-- Search Section -->
      <section class="search-section">
        <div class="search-container">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜索餐厅、美食..." />
            <button class="filter-btn" id="filterBtn">
              <i class="fas fa-sliders-h"></i>
            </button>
          </div>
        </div>
        
        <!-- Category Tabs -->
        <div class="category-tabs">
          <button class="tab active" data-category="all">全部</button>
          <button class="tab" data-category="chinese">中餐</button>
          <button class="tab" data-category="western">西餐</button>
          <button class="tab" data-category="japanese">日料</button>
          <button class="tab" data-category="korean">韩料</button>
          <button class="tab" data-category="dessert">甜品</button>
          <button class="tab" data-category="coffee">咖啡</button>
        </div>
      </section>

      <!-- Restaurant List -->
      <main class="main-content">
        <div class="restaurant-list" id="restaurantList">
          <!-- 餐厅卡片将通过JavaScript动态生成 -->
        </div>
      </main>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <button class="nav-item active" data-page="home">
          <i class="fas fa-home"></i>
          <span>首页</span>
        </button>
        <button class="nav-item" data-page="favorites">
          <i class="fas fa-heart"></i>
          <span>收藏</span>
        </button>
        <button class="nav-item" data-page="nearby">
          <i class="fas fa-map-marker-alt"></i>
          <span>附近</span>
        </button>
        <button class="nav-item" data-page="profile">
          <i class="fas fa-user"></i>
          <span>我的</span>
        </button>
      </nav>
    </div>

    <!-- Filter Modal -->
    <div class="modal" id="filterModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>筛选条件</h3>
          <button class="close-btn" id="closeFilter">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="modal-body">
          <div class="filter-group">
            <h4>价格范围</h4>
            <div class="price-range">
              <button class="price-btn active" data-price="all">全部</button>
              <button class="price-btn" data-price="low">¥</button>
              <button class="price-btn" data-price="medium">¥¥</button>
              <button class="price-btn" data-price="high">¥¥¥</button>
            </div>
          </div>
          <div class="filter-group">
            <h4>评分</h4>
            <div class="rating-range">
              <button class="rating-btn active" data-rating="all">全部</button>
              <button class="rating-btn" data-rating="4">4.0+</button>
              <button class="rating-btn" data-rating="4.5">4.5+</button>
            </div>
          </div>
          <div class="filter-group">
            <h4>距离</h4>
            <div class="distance-range">
              <button class="distance-btn active" data-distance="all">全部</button>
              <button class="distance-btn" data-distance="1">1km内</button>
              <button class="distance-btn" data-distance="3">3km内</button>
              <button class="distance-btn" data-distance="5">5km内</button>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="resetFilter">重置</button>
          <button class="btn-primary" id="applyFilter">应用筛选</button>
        </div>
      </div>
    </div>

    <!-- Restaurant Detail Modal -->
    <div class="modal" id="restaurantModal">
      <div class="modal-content restaurant-detail">
        <div class="modal-header">
          <button class="back-btn" id="backBtn">
            <i class="fas fa-arrow-left"></i>
          </button>
          <h3 id="restaurantName">餐厅详情</h3>
          <button class="favorite-btn" id="favoriteBtn">
            <i class="fas fa-heart"></i>
          </button>
        </div>
        <div class="modal-body" id="restaurantDetailContent">
          <!-- 餐厅详情内容将通过JavaScript动态生成 -->
        </div>
      </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
      <i class="fas fa-check-circle"></i>
      <span id="toastMessage">操作成功</span>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
